services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: estock-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "127.0.0.1:12181:2181"
    networks:
      - estock-network

  # 단일 브로커 (학습용). 운영급 확장 시 kafka-2, kafka-3 추가하고
  # KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR / TRANSACTION_STATE_LOG_REPLICATION_FACTOR / MIN_INSYNC_REPLICAS 를 3 / 3 / 2 로 상향.
  kafka-1:
    image: confluentinc/cp-kafka:7.7.1
    container_name: estock-kafka-1
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "127.0.0.1:19092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://kafka-1:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:29092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # JVM heap 제한 (노트북 환경에서 OOM 방지)
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka-1:29092 --list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - estock-network

  # provectuslabs/kafka-ui 는 2023년 말 유지보수 중단 (CVE-2023-52251 RCE 6개월간 미패치).
  # 원 메인테이너 포크인 kafbat 이 사실상 후속 프로젝트. v1.1.0 (2025-01) 은 1년 이상 검증된 안정 태그.
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:v1.1.0
    container_name: estock-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka-1:
        condition: service_healthy
    ports:
      - "0.0.0.0:18088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: estock-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - estock-network

  postgres:
    image: postgres:15.17-alpine
    container_name: estock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:15439:5432"
    volumes:
      - estock_postgres_data:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - estock-network

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estock-airflow-init
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow_db
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        (airflow users create \
          --username airflow \
          --password airflow \
          --firstname airflow \
          --lastname airflow \
          --role Admin \
          --email admin@example.com \
          || echo "user already exists, skipping.")
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    networks:
      - estock-network

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estock-airflow-webserver
    restart: unless-stopped
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow_db
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    command: webserver
    ports:
      - "0.0.0.0:18080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    networks:
      - estock-network

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estock-airflow-scheduler
    restart: unless-stopped
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow_db
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    networks:
      - estock-network

networks:
  estock-network:

volumes:
  estock_postgres_data:
