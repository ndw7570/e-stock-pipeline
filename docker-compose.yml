services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: ${CONTAINER_PREFIX:-data-engine}-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_BIND_HOST:-127.0.0.1}:${ZOOKEEPER_HOST_PORT:-12181}:2181"
    networks:
      - data-engine-network

  # 단일 브로커 (학습용). 운영급 확장 시 kafka-2, kafka-3 추가하고
  # KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR / TRANSACTION_STATE_LOG_REPLICATION_FACTOR / MIN_INSYNC_REPLICAS 를 3 / 3 / 2 로 상향.
  kafka-1:
    image: confluentinc/cp-kafka:7.7.1
    container_name: ${CONTAINER_PREFIX:-data-engine}-kafka-1
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_BIND_HOST:-127.0.0.1}:${KAFKA_HOST_PORT:-19092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://kafka-1:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:29092,EXTERNAL://${KAFKA_ADVERTISED_HOST:-localhost}:${KAFKA_HOST_PORT:-19092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server kafka-1:29092 --list >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - data-engine-network

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:v1.1.0
    container_name: ${CONTAINER_PREFIX:-data-engine}-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka-1:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_BIND_HOST:-0.0.0.0}:${KAFKA_UI_HOST_PORT:-18088}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_CLUSTER_NAME:-data-engine-cluster}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - data-engine-network

  postgres:
    image: postgres:15.17-alpine
    container_name: ${CONTAINER_PREFIX:-data-engine}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_HOST_PORT:-15439}:5432"
    volumes:
      - data_engine_postgres_data:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-engine-network

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_PREFIX:-data-engine}-airflow-init
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
      - .env.dev
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow_db
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      PYTHONPATH: /opt/airflow
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    command: db migrate
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./app:/opt/airflow/app
      - ./secrets:/opt/airflow/secrets
    networks:
      - data-engine-network

  airflow-api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_PREFIX:-data-engine}-airflow-api-server
    restart: unless-stopped
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
      - .env.dev
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow_db
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      PYTHONPATH: /opt/airflow
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "airflow:admin"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    command: api-server
    ports:
      - "${AIRFLOW_WEBSERVER_BIND_HOST:-0.0.0.0}:${AIRFLOW_WEBSERVER_HOST_PORT:-18080}:8080"
      - "18089:18089"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./app:/opt/airflow/app
      - ./secrets:/opt/airflow/secrets
    networks:
      - data-engine-network

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_PREFIX:-data-engine}-airflow-scheduler
    restart: unless-stopped
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
      - .env.dev
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow_db
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      PYTHONPATH: /opt/airflow
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "airflow:admin"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./app:/opt/airflow/app
      - ./secrets:/opt/airflow/secrets
    networks:
      - data-engine-network

  airflow-dag-processor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_PREFIX:-data-engine}-airflow-dag-processor
    restart: unless-stopped
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
      - .env.dev
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow_db
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      PYTHONPATH: /opt/airflow
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "airflow:admin"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    command: dag-processor
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./app:/opt/airflow/app
      - ./secrets:/opt/airflow/secrets
    networks:
      - data-engine-network

  minio:
    image: minio/minio:latest
    container_name: ${CONTAINER_PREFIX:-data-engine}-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - data_engine_minio_data:/data
    networks:
      - data-engine-network

networks:
  data-engine-network:

volumes:
  data_engine_postgres_data:
  data_engine_minio_data:
